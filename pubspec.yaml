name: planney
description: Planney - Financial planner modern dengan nuansa light
publish_to: "none"
version: 1.6.4+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  google_sign_in: ^7.2.0
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  intl: ^0.20.2
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  image_picker: ^1.0.5
  camera: ^0.12.0
  flutter_svg: ^2.0.9
  url_launcher: ^6.2.2
  path_provider: ^2.1.1
  flutter_animate: ^4.3.0
  cupertino_icons: ^1.0.2
  device_calendar: ^4.3.3
  permission_handler: ^11.3.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
